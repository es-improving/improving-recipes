name: Claude Code Review
on:
  pull_request:
    types: [opened, synchronize]

jobs:
  review:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
      pull-requests: write
      checks: read
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          github_token: ${{ secrets.GITHUB_TOKEN }}
          prompt: |
            Review pull request #${{ github.event.pull_request.number }} in
            ${{ github.repository }}.

            Do not use any skills or slash commands. Review the PR directly
            using gh pr view --json and gh pr diff.

            Review this pull request. Focus on correctness, edge cases,
            and security issues. Be terse. Skip praise. Post inline
            comments on specific lines and a short summary comment.
            Also post one short summary comment at the end listing what you
            checked, even if you found nothing.
          claude_args: --model claude-sonnet-4-6 --max-turns 50 --allowedTools "Bash(gh pr view:*),Bash(gh pr diff:*),Bash(gh pr list:*),Bash(gh pr review --comment:*)),Bash(gh pr comment:*)"

      - name: Upload Claude execution log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: claude-execution-output
          path: /home/runner/work/_temp/claude-execution-output.json
          if-no-files-found: warn
